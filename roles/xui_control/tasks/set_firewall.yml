- name: Install nftables
  become: true
  package:
    name: nftables
    state: present

- name: Deploy nftables config
  become: true
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"

- name: Validate nftables config
  become: true
  command: nft -c -f /etc/nftables.conf
  changed_when: false

- name: Enable and restart nftables
  become: true
  service:
    name: nftables
    enabled: true
    state: restarted
